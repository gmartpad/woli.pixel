services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-woli}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-woli_pixel_2026}
      POSTGRES_DB: ${POSTGRES_DB:-woli_pixel}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-woli}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
